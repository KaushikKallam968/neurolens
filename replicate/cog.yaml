build:
  gpu: true
  cuda: "12.4"
  python_version: "3.11"
  system_packages:
    - ffmpeg
    - libsndfile1
  python_packages:
    - numpy>=1.24
    - torch>=2.4
    - torchaudio>=2.4
    - torchvision>=0.19
    - scipy
    - pandas
    - ffmpeg-python
    - einops
    - pyyaml
    - moviepy>=2.2.1
    - huggingface_hub
    - gtts
    - langdetect
    - spacy
    - soundfile
    - Levenshtein
    - julius
    - transformers
    - x_transformers==1.27.20
    - neuralset==0.0.2
    - neuraltrain==0.0.2

  run:
    - python -c "from huggingface_hub import hf_hub_download; hf_hub_download('facebook/tribev2', 'config.yaml', local_dir='/src/model_weights'); hf_hub_download('facebook/tribev2', 'best.ckpt', local_dir='/src/model_weights')"
    - python -m spacy download en_core_web_sm

predict: "predict.py:Predictor"
