name: Push Cog Model to Replicate

on:
  workflow_dispatch:

jobs:
  push:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt-get clean
          df -h /

      - name: Install Cog
        run: |
          sudo curl -o /usr/local/bin/cog -L https://github.com/replicate/cog/releases/latest/download/cog_$(uname -s)_$(uname -m)
          sudo chmod +x /usr/local/bin/cog
          cog --version

      - name: Build and push to Replicate
        env:
          COG_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
        working-directory: replicate
        run: |
          cog push r8.im/kaushikkallam968/neurolens-tribev2

      - name: Output version
        if: success()
        run: echo "Model pushed successfully to r8.im/kaushikkallam968/neurolens-tribev2"
